<!-- =====================================================================
     To Have and Hold: Reservations (Kajabi embed)

     Inlines the reservations.html iframe directly on the Kajabi page.
     The receiver script syncs iframe height to its content so the page
     reads as native, with no internal scrollbar.

     Step II inside the iframe ("Browse the full collection") opens the
     Booqable storefront in a new tab. Cart, rental agreement, and payment
     all live on Booqable. No modal or postMessage handoff needed here.
     ===================================================================== -->

<iframe
  id="tohave-reservations"
  title="To Have and Hold reservations"
  src="https://drsrennie-stack.github.io/tohave-hold/reservations.html"
  scrolling="no"
  loading="lazy"
  allow="clipboard-write"
  style="width:100%; border:0; display:block; min-height:800px; background:transparent;">
</iframe>

<script>
(function(){
  // Iframe height-receiver. Listens for postMessage from any iframe using
  // the {type:'iframe-height', id, height} protocol and resizes the matching
  // iframe to fit its content. Safe to leave in place even if you add more
  // branded iframes to this page later.
  window.addEventListener('message', function(e){
    var data = e && e.data;
    if (!data || data.type !== 'iframe-height' || typeof data.height !== 'number') return;
    var iframe = document.getElementById(data.id);
    if (iframe) iframe.style.height = (data.height + 24) + 'px';
  });
})();
</script>
